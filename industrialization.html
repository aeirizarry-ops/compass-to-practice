<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Industrialization Readiness | Compass To Practice</title>
    <meta
      name="description"
      content="Compass To Practice helps teams turn product design into repeatable execution by aligning process, people, quality, tooling, layout, and launch control before ramp pressure exposes the gaps."
    />
    <meta property="og:title" content="Industrialization Readiness | Compass To Practice" />
    <meta
      property="og:description"
      content="Compass To Practice helps teams turn product design into repeatable execution by aligning process, people, quality, tooling, layout, and launch control before ramp pressure exposes the gaps."
    />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        background: #050b13;
      }

      .visual-header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: rgba(5, 11, 19, 0.82);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(240, 178, 63, 0.16);
      }

      .visual-header .brand-mark {
        width: 42px;
        height: 42px;
        flex: 0 0 auto;
        border-radius: 50%;
      }

      .story {
        width: min(1440px, 100%);
        margin: 0 auto;
        padding: 0;
      }

      .story figure {
        margin: 0;
        background: #fff;
      }

      .story img {
        display: block;
        width: 100%;
        height: auto;
      }

      .story figure + figure {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      @media (max-width: 860px) {
        .visual-header {
          padding: 12px 14px;
        }

        .visual-header .brand-mark {
          width: 38px;
          height: 38px;
        }
      }
    </style>
  </head>
  <body>
    <header class="visual-header" aria-label="Home link">
      <a href="index.html" aria-label="Compass To Practice home">
        <img class="brand-mark" src="assets/compass-badge-logo.jpg" alt="Compass To Practice" width="1130" height="1130" />
      </a>
    </header>

    <main class="story" aria-label="Industrialization visual story">
      <figure>
        <img src="assets/industrial-problem.jpg" alt="Industrialization readiness problem visual" />
      </figure>
      <figure>
        <img src="assets/industrial-point-of-view.jpg" alt="Compass To Practice industrialization point of view visual" />
      </figure>
      <figure>
        <img src="assets/industrial-readiness-path.jpg" alt="Compass To Practice industrialization readiness path visual" />
      </figure>
      <figure>
        <img src="assets/industrial-work-with-you.jpg" alt="How Compass To Practice works with you visual" />
      </figure>
      <figure>
        <img src="assets/industrial-close.jpg" alt="Industrialization closing visual" />
      </figure>
    </main>
  </body>
</html>
